会地位的人吸引，在意对方的影响力和资源。","提示词":"主角可能会对明星、大佬、知名人士产生好感，想要接近或结交。容易被表面光鲜的人迷惑，也可能因此进入上流圈子。"},{"名称":"清高","描述":"不屑于讨好权贵，讨厌趋炎附势，保持自己的格调。","提示词":"这个特质让主角在面对大人物时依然不卑不亢，可能赢得尊重也可能得罪人。不容易被收买，但可能因此错失机会。"},{"名称":"懦弱","描述":"遇到冲突时倾向退缩，害怕正面冲突和高压场面。","提示词":"这个特质让主角在面对威胁时更容易屈服或逃跑，但也可能因此避开危险。需要有人撑腰才能鼓起勇气。"},{"名称":"强势","描述":"习惯掌握主动权，遇到分歧不会轻易退让。","提示词":"这个特质让主角在谈判或争执中占优势，但也容易树敌。别人会觉得她不好惹，但也可能因此错失和解机会。"},{"名称":"慕智","描述":"容易被聪明、有才华的人吸引，对智商和知识有崇拜感。","提示词":"主角会被学霸、专家、技术大牛吸引，喜欢和他们交流。容易因为对方的才华而忽略性格缺陷，也可能因此提升自己。"},{"名称":"恋足","描述":"对脚部有特殊审美偏好，会被好看的脚或鞋吸引。","提示词":"日常会关注别人的鞋子和脚踝，可能因此注意到某些细节。在亲密互动中视野会自然往下移。"},{"名称":"声控","描述":"对好听的声音没有抵抗力，特别是低音炮或清亮嗓音。","提示词":"会因为声音而对某人产生好感，电话或语音时容易走神。直播时会被声音好听的观众或房管吸引。"},{"名称":"手控","描述":"对手部线条好看的人格外关注，手指长、关节分明是加分项。","提示词":"握手或递东西时会留意对方的手。亲密互动中情不自禁把玩对方手指。可能因此忽略其他方面的缺点。"},{"名称":"制服控","描述":"对穿制服的人（警察、医生、军装、西服）有特别好感。","提示词":"容易被特定职业的人吸引，也喜欢自己穿制服。在某些场合（如探访医院、警察局）容易分心。"},{"名称":"微醺控","描述":"喜欢喝酒后微醺的状态，觉得比清醒时更放得开。","提示词":"酒吧或居家小酌时容易进入状态，酒后可能会做出清醒时不敢做的事。容易被利用，也更容易表露真心。"},{"名称":"支配","描述":"享受在亲密关系中主导的地位，喜欢掌控节奏。","提示词":"这个偏好会让主角在关系中更主动，可能吸引喜欢被带领的人。在魅魔能力使用时倾向于掌控方。"},{"名称":"服从","描述":"享受在亲密关系中被主导的感觉，喜欢交出控制权。","提示词":"这个偏好会让主角在关系中更顺从，可能吸引掌控欲强的人。在魅魔能力使用时倾向于交出自己。"}],"直播风格":[{"名称":"严肃认真","图标":"serious","描述":"专注内容，少废话，严谨专业，不刻意迎合观众。","提示词":"这种风格下，主角的直播内容会聚焦于硬核技巧或深度讲解，话少但干货多。适合吸引喜欢专业性的观众，但可能流失休闲用户。剧情上可能被平台推荐到硬核区，或者吸引技术型粉丝。"},{"名称":"体贴互动","图标":"caring","描述":"频繁回复弹幕，关心观众感受，营造温暖氛围。","提示词":"这种风格让观众感到被重视，弹幕氛围温馨，容易培养核心粉丝群。但过于关注互动可能影响游戏操作或任务专注度。剧情上可以发展出忠实观众成为线下帮手或追求者。"},{"名称":"擦边暗示","图标":"seductive","描述":"使用双关语、暗示性动作或话语，吸引特定受众。","提示词":"这种风格带有性暗示，容易快速涨粉但风险极高（易被封禁）。适合短期炒作或吸引特定群体，但可能给主角带来声誉问题。剧情上可能被平台警告，或者招惹到不怀好意的观众。"},{"名称":"幽默搞笑","图标":"funny","描述":"频繁抛梗、自嘲、夸张表演，制造轻松笑点。","提示词":"这种风格轻松欢乐，观众粘性高，但容易被人认为是“不专业”。适合与朋友连麦或参加综艺类直播。剧情上可以发展出搞笑搭档，或者因为玩笑得罪人。"},{"名称":"暴躁吐槽","图标":"angry","描述":"骂队友、摔道具、大声抱怨，以激烈情绪为看点。","提示词":"这种风格以情绪爆发为卖点，容易出圈传播，但负面评价也多。可能引起平台限流或观众举报。剧情上可以设计她因为暴躁骂人被网暴，或者被某个金主看中这种“真性情”。"},{"名称":"温柔治愈","图标":"gentle","描述":"语速舒缓，声音轻柔，常安慰观众，适合睡前或放松。","提示词":"这种风格适合深夜档，观众多为压力大或失眠的人。容易培养死忠粉，但涨粉慢。剧情上可以吸引到有心理问题的观
